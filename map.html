}

// ──────────────────────────────────────────────
// 팝업 HTML 생성
// ──────────────────────────────────────────────
function buildPopup(s) {
  const cat = categoryConfig[s.category];
  const pay = paymentConfig[s.payment];

  const badgeColor = cat.color + '22';
  const badgeText = cat.color;

  let html = `
    <div class="popup-inner">
      <div class="popup-header">
        <div style="flex:1">
          <div class="popup-name-ja">${cat.emoji} ${s.name_ja}</div>
          <div class="popup-name-ko">${s.name_ko}</div>
        </div>
        <div class="popup-category-badge" style="background:${badgeColor};color:${badgeText}">
          ${cat.label}
        </div>
      </div>

      <div class="popup-divider"></div>

      <div class="popup-desc-ja">${s.desc_ja}</div>
      <div class="popup-desc-ko">${s.desc_ko}</div>

      ${s.note ? `<div class="popup-schedule" style="background:#fff8e1;color:#e65100">${s.note}</div>` : ''}

      <div class="popup-ratings">
        <div class="rating-row">
          <span class="rating-label">🇯🇵 현지인 인기도</span>
          <span class="stars" style="color:#FF9800">${renderStars(s.local_rating)}</span>
        </div>
        <div class="rating-row">
          <span class="rating-label">🇰🇷 한국 인지도</span>
          <span class="stars" style="color:#4FC3F7">${renderStars(s.korean_rating)}</span>
        </div>
      </div>

      <div class="popup-payment ${pay.cls}">
        ${pay.icon}&nbsp;${pay.text}
      </div>

      <div class="popup-schedule">${s.schedule.replace(/\n/g,'<br/>')}</div>
      <div class="popup-address">📍 ${s.address_ja}</div>

      ${s.reservation ? `
        <div class="popup-reservation">
          <a href="${s.reservation}" target="_blank">${s.reservation_label}</a>
        </div>` : ''}

      <div style="margin-top:10px">
        <a href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}"
           target="_blank"
           style="display:flex;align-items:center;justify-content:center;gap:8px;
                  padding:9px 12px;background:#34A853;color:white;border-radius:8px;
                  font-size:12px;font-weight:700;text-decoration:none">
          🗺 구글 길찾기 / Googleナビ
        </a>
      </div>
    </div>`;
  return html;
}

// ──────────────────────────────────────────────
// 커스텀 마커 아이콘
// ──────────────────────────────────────────────
function makeIcon(category) {
  const cat = categoryConfig[category];
  const html = `
    <div style="
      width:36px;height:36px;
      background:${cat.color};
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 3px 8px rgba(0,0,0,0.35);
      border:2px solid white;
    ">
      <span style="transform:rotate(45deg);font-size:15px;line-height:1">${cat.emoji}</span>
    </div>`;
  return L.divIcon({
    html,
    className: '',
    iconSize: [36, 36],
    iconAnchor: [18, 36],
    popupAnchor: [0, -38]
  });
}

// ──────────────────────────────────────────────
// 지도 초기화
// ──────────────────────────────────────────────
const map = L.map('map', {
  center: [33.5893, 130.4000],
  zoom: 15,
  zoomControl: true
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

// ──────────────────────────────────────────────
// 하단 길찾기 바 업데이트
// ──────────────────────────────────────────────
function updateNavBar(s) {
  const cat = categoryConfig[s.category];
  const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}`;
  document.getElementById('nav-placeholder').style.display = 'none';
  const navContent = document.getElementById('nav-content');
  navContent.style.display = 'flex';
  document.getElementById('nav-spot-name').innerHTML =
    `${cat.emoji} ${s.name_ko}<small>${s.name_ja}</small>`;
  document.getElementById('nav-btn').href = mapsUrl;
}

// 스팟 마커 추가
spots.forEach(s => {
  const marker = L.marker([s.lat, s.lng], { icon: makeIcon(s.category) }).addTo(map);
  marker.bindPopup(buildPopup(s), { maxWidth: 300, minWidth: 260 });
  marker.on('click', () => updateNavBar(s));
});

// 숙소 기점 강조 원
L.circle([33.5906, 130.4016], {
  color: '#2196F3',
  fillColor: '#2196F3',
  fillOpacity: 0.06,
  radius: 700,
  dashArray: '6 4',
  weight: 1.5
}).addTo(map).bindTooltip('도보 약 15분 반경', { permanent: false });
</script>
</body>
</html>
